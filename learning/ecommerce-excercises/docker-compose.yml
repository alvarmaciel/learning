services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DARABASE: ecommerce
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+aiomysql://root:root@db:3306/ecommerce
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "pytest", "tests/", "-v"]
    
      
